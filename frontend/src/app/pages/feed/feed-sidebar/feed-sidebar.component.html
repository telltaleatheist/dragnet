<div class="sidebar">
  <!-- Views -->
  <div class="sidebar-section">
    <div class="section-title">Views</div>
    @for (option of views; track option.label) {
      <button
        class="sidebar-item"
        [class.active]="activeView === option.value"
        (click)="setView(option)"
      >
        @if (option.icon) {
          <span class="sidebar-icon">{{ option.icon }}</span>
        }
        <span>{{ option.label }}</span>
      </button>
    }
  </div>

  <!-- Platforms -->
  <div class="sidebar-section">
    <div class="section-title">Platforms</div>
    @for (option of platforms; track option.label) {
      <button
        class="sidebar-item"
        [class.active]="activePlatform === option.value"
        (click)="setPlatform(option)"
      >
        @if (option.icon) {
          <span class="sidebar-icon">{{ option.icon }}</span>
        }
        <span>{{ option.label }}</span>
      </button>
    }
  </div>

  <!-- Content Type -->
  <div class="sidebar-section">
    <div class="section-title">Content Type</div>
    @for (option of contentTypes; track option.label) {
      <button
        class="sidebar-item"
        [class.active]="activeContentType === option.value"
        (click)="setContentType(option)"
      >
        @if (option.icon) {
          <span class="sidebar-icon">{{ option.icon }}</span>
        }
        <span>{{ option.label }}</span>
      </button>
    }
  </div>
</div>
