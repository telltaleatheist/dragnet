<div class="sidebar">
  <!-- Views -->
  <div class="sidebar-section">
    <div class="section-title">Views</div>
    @for (view of views; track view.value) {
      <button
        class="sidebar-item"
        [class.active]="store.activeView() === view.value"
        (click)="setView(view)"
      >
        <span class="sidebar-icon" [innerHTML]="view.icon"></span>
        <span>{{ view.label }}</span>
      </button>
    }
  </div>
</div>
